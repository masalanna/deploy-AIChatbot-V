services:
  - type: web
    name: softdel-sva
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: SENTENCE_TRANSFORMERS_HOME
        value: /opt/render/project/.cache/sentence_transformers
      - key: HF_HOME
        value: /opt/render/project/.cache/huggingface
      - key: GROQ_API_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: SCHEDULER_BACKEND
        value: smtp
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: NOTIFY_EMAIL
        sync: false